.av{border-radius:50%;background:#ebe6ff;display:flex;align-items:center;justify-content:center;font-weight:700;color:#534AB7;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:13px}
td{padding:8px 0;border-bottom:1px solid #f0f0f0;color:#444;font-weight:500}

.st{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

  el.textContent=msg;el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},2500);
}

function tots(p){
  var ing=0,gas=0;
  (p.movimientos||[]).forEach(function(m){if(m.tipo==="ingreso")ing+=m.monto;else gas+=m.monto;});
  return {ing:ing,gas:gas,sal:ing-gas,roi:gas>0?(ing-gas)/gas*100:0};
}

function bar(pct,color){
  return '<div class="bar"><div class="bf" style="width:'+Math.min(100,pct)+'%;background:'+color+'"></div></div>';
}
function met(l,v,c){
  return '<div class="metric"><div class="mlbl">'+l+'</div><div class="mval '+(c||"wht")+'">'+v+'</div></div>';
}

function loadData(){
  seedData();render();
  var xhr=new XMLHttpRequest();
  xhr.open("GET",SURL,true);xhr.timeout=5000;
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      if(d.projects&&d.projects.length){projects=d.projects;render();toast2("Datos sincronizados");}
    }catch(e){}
  };
  xhr.send();
}

function persist(){
  var xhr=new XMLHttpRequest();
  xhr.open("POST",SURL,true);
  xhr.onload=function(){toast2("Guardado");};
  xhr.send(JSON.stringify({projects:projects}));
}
function save(){persist();render();}

function render(){
  var html=view==="dash"?dashV():projV();
  if(conf) html+=confV();
  document.getElementById("root").innerHTML=html;
}

function dashV(){
  var ti=0,tg=0,mx=1;
  projects.forEach(function(p){var t=tots(p);ti+=t.ing;tg+=t.gas;if(t.ing>mx)mx=t.ing;if(t.gas>mx)mx=t.gas;});
  var ts=ti-tg,tr=tg>0?(ti-tg)/tg*100:0;
  var comp="";
  projects.forEach(function(p){
    var t=tots(p);
    comp+='<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:5px;color:#111">'+p.name+'</div>';
    comp+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:11px;color:#444;font-weight:600;width:60px;flex-shrink:0">Ingresos</span>';
    comp+='<div class="bar" style="flex:1;margin:0"><div class="bf" style="width:'+(t.ing/mx*100)+'%;background:#1D9E75"></div></div>';
    comp+='<span style="font-size:11px;color:#1a7a58;font-weight:700;width:75px;text-align:right;flex-shrink:0">'+gs(t.ing)+'</span></div>';
    comp+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#444;font-weight:600;width:60px;flex-shrink:0">Gastos</span>';
    comp+='<div class="bar" style="flex:1;margin:0"><div class="bf" style="width:'+(t.gas/mx*100)+'%;background:#E24B4A"></div></div>';
    comp+='<span style="font-size:11px;color:#b53030;font-weight:700;width:75px;text-align:right;flex-shrink:0">'+gs(t.gas)+'</span></div></div>';
  });
  var cards="";
  projects.forEach(function(p){
    var t=tots(p),pt=t.gas>0?Math.min(100,t.ing/t.gas*100):0;
    var sc=t.sal>=0?"#1a7a58":"#b53030",rc=t.roi>=0?"#1a7a58":"#b53030";
    cards+='<div class="card" style="cursor:pointer" onclick="openP(\''+p.id+'\')"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
    cards+='<div class="av" style="width:36px;height:36px;font-size:12px">'+p.name.slice(0,2).toUpperCase()+'</div>';
    cards+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px;color:#111">'+p.name+'</div>';
    cards+='<div style="font-size:11px;color:#555;font-weight:500">'+(p.movimientos||[]).length+' movimientos</div></div>';
    cards+='<div style="text-align:right;flex-shrink:0"><div style="font-size:15px;font-weight:700;color:'+sc+'">'+gs(t.sal)+'</div>';
    cards+='<div style="font-size:12px;font-weight:600;color:'+rc+'">ROI '+pp(t.roi)+'</div></div>';
    cards+='<button class="db" onclick="event.stopPropagation();askDel(\''+p.id+'\')">x</button></div>';
    cards+=bar(pt,pt>=100?"#1D9E75":"#534AB7");
    cards+='<div style="display:flex;justify-content:space-between;font-size:11px;color:#555;font-weight:500"><span>Recuperado '+pt.toFixed(0)+'%</span><span>'+gs(t.ing)+' de '+gs(t.gas)+'</span></div></div>';
  });
  var form="";
  if(showAddP){
    form='<div class="card"><input placeholder="Nombre del proyecto" oninput="np.name=this.value" value="'+np.name+'">';
    form+='<input placeholder="Descripcion (opcional)" oninput="np.desc=this.value" value="'+np.desc+'">';
    form+='<div style="display:flex;gap:8px"><button onclick="doAddP()" style="flex:1">Crear</button><button onclick="showAddP=false;render()" style="flex:1">Cancelar</button></div></div>';
  }
  var h='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">';
  h+='<div style="display:flex;align-items:center;gap:10px">'+logoSVG()+'<div>';
  h+='<div style="font-size:17px;font-weight:700;color:#111">Portfolio de inversiones</div>';
  h+='<div style="font-size:12px;color:#555;font-weight:500">'+projects.length+' proyectos</div></div></div>';
  h+='<button onclick="showAddP=true;render()">+ Nuevo</button></div>';
  h+='<div class="g2">'+met("Total invertido",gs(tg),"red")+met("Total recuperado",gs(ti),"grn")+'</div>';
  h+='<div class="g2">'+met("Saldo global",gs(ts),ts>=0?"grn":"red")+met("ROI global",pp(tr),tr>=0?"grn":"red")+'</div>';
  h+='<div class="card"><div class="st">Comparativa por proyecto</div>'+comp+'</div>';
  h+=form+cards;
  return h;
}

function projV(){

    else{

    proy+='<tr><td>Recaudacion neta</td><td>'+gs(pr.recaudacionNeta)+'</td></tr>';
    proy+='<tr><td>Utilidad neta</td><td>'+gs(pr.utilidadNeta)+'</td></tr>';
    proy+='<tr><td>ROI proyectado</td><td>'+pr.roi.toFixed(1)+'%</td></tr>';
    proy+='<tr><td>TIR proyectada</td><td>'+pr.tir.toFixed(1)+'%</td></tr>';
    proy+='<tr><td>VAN (12%)</td><td>'+gs(pr.van)+'</td></tr>';

    var comp2='<div class="card"><div class="st">Comparativa mensual: Real vs Proyectado</div><div style="overflow-x:auto">';
    comp2+='<table style="min-width:560px;font-size:10px"><tr style="border-bottom:2px solid #e0e0e0">';
    comp2+='<td style="padding:6px 4px;font-weight:700;color:#444">Mes</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#1a7a58">Real ing.</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#b53030">Real gas.</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#534AB7">Proy. ing.</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#444">Dif.</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#534AB7">Acum. proy.</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#1a7a58">Acum. real</td>';
    comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:#444">Dif. acum.</td></tr>';
    var acumReal=0;
    lista.forEach(function(f){
      var r=rpm[f.mes]||{ing:0,gas:0};
      var gv=f.mes==="Ene 2026"?374674699:r.gas;
      var pv=f.mes==="Ene 2026"?-445275000:f.tuFlujo;
      var dv=f.mes==="Ene 2026"?(445275000-374674699):(r.ing-f.tuFlujo);
      var acumProy=f.tuAcumulado;
      var realFlujo=f.mes==="Ene 2026"?-374674699:(r.ing-r.gas);
      acumReal+=realFlujo;
      var difAcum=acumReal-acumProy;
      var em=f.mes.toLowerCase().slice(0,3)===mesAct&&f.anio===anioAct;
      var hasReal=r.ing>0||r.gas>0||f.mes==="Ene 2026";
      var bg=em?"background:#fffbe6":hasReal?"background:#f8fff8":"";
      comp2+='<tr style="border-bottom:1px solid #f0f0f0;'+bg+'">';
      comp2+='<td style="padding:6px 4px;font-weight:'+(em?"700":"400")+';color:'+(em?"#BA7517":"#444")+';white-space:nowrap">'+f.mes+(em?" &lt;":"")+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;color:#1a7a58;font-weight:600">'+(r.ing>0?gs(r.ing):"-")+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;color:#b53030;font-weight:600">'+(gv>0?gs(gv):"-")+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;color:#534AB7;font-weight:600">'+gs(pv)+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:'+(dv>=0?"#1a7a58":"#b53030")+'">'+(hasReal?(dv>=0?"+":"")+gs(dv):"-")+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;font-weight:600;color:'+(acumProy>=0?"#534AB7":"#b53030")+'">'+gs(acumProy)+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;font-weight:600;color:'+(hasReal?(acumReal>=0?"#1a7a58":"#b53030"):"#999")+'">'+(hasReal?gs(acumReal):"-")+'</td>';
      comp2+='<td style="padding:6px 4px;text-align:right;font-weight:700;color:'+(hasReal?(difAcum>=0?"#1a7a58":"#b53030"):"#999")+'">'+(hasReal?(difAcum>=0?"+":"")+gs(difAcum):"-")+'</td></tr>';
    });
    comp2+='</table></div><div style="font-size:11px;color:#888;margin-top:10px">Fondo verde = meses con datos reales cargados</div></div>';
    return hdr+comp2;
  }

  return hdr;
}

function confV(){
  return '<div class="ov"><div class="card" style="max-width:290px;width:100%"><p style="font-size:13px;margin-bottom:14px;color:#111;font-weight:500">Eliminar este proyecto? No se puede deshacer.</p><div style="display:flex;gap:8px"><button onclick="doDelete()" style="flex:1;color:#b53030;font-weight:700">Eliminar</button><button onclick="conf=null;render()" style="flex:1">Cancelar</button></div></div></div>';
}

function openP(id){pid=id;view="proj";curtab="mov";showAddM=false;render();}
function goBack(){view="dash";pid=null;showAddP=false;render();}
function askDel(id){conf=id;render();}

function doAddP(){
  var n=np.name.trim();if(!n)return;
  projects.push({id:uid(),name:n,desc:np.desc,movimientos:[]});
  np={name:"",desc:""};showAddP=false;save();
}
function doDelete(){
  projects=projects.filter(function(p){return p.id!==conf;});
  if(pid===conf){view="dash";pid=null;}
  conf=null;save();
}
function doAddM(){
  var mo=parseFloat(nm.monto);
  if(!nm.concepto.trim()||isNaN(mo)||mo<=0)return;
  projects.forEach(function(p){if(p.id===pid)p.movimientos.push({id:uid(),tipo:nm.tipo,concepto:nm.concepto,monto:mo,fecha:nm.fecha});});
  nm={tipo:"gasto",concepto:"",monto:"",fecha:new Date().toISOString().slice(0,10)};
  showAddM=false;save();
}
function doDelM(id){
  projects.forEach(function(p){if(p.id===pid)p.movimientos=p.movimientos.filter(function(m){return m.id!==id;});});
  save();
}

loadData();
</script>
